<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Repp – Restablecé tu contraseña</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #000;
      color: #FAFAFA;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      background: #111;
      border: 1px solid #262626;
      border-radius: 16px;
      padding: 36px 40px 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    img { border-radius: 14px; border: 1px solid #262626; margin-bottom: 20px; }
    h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 10px; }
    p  { font-size: 14px; color: #8C8C8C; line-height: 1.65; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      background: #0F62FE;
      color: #FFF;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      letter-spacing: 0.01em;
      width: 100%;
    }
    .error { color: #ff6b6b; font-size: 14px; margin-top: 16px; display: none; }
    .footer { font-size: 12px; color: #444; margin-top: 24px; }
    .footer a { color: #555; }
  </style>
</head>
<body>
  <div>
    <div style="text-align:center; margin-bottom: 16px;">
      <img src="https://repplab.com/assets/icon.png" width="52" height="52" alt="repp." />
    </div>

    <div class="card">
      <h1 id="heading">Abriendo la app…</h1>
      <p id="body">Si la app no se abre automáticamente, tocá el botón.</p>
      <a id="deeplink-btn" class="btn" href="#">Abrir en Repp</a>
      <p class="error" id="error-msg">
        No pudimos detectar los parámetros del link. Pedí un nuevo correo de restablecimiento.
      </p>
    </div>

    <p class="footer" style="text-align:center; margin-top: 20px;">
      © 2026 repp. &nbsp;·&nbsp;
      <a href="https://repplab.com">repplab.com</a>
    </p>
  </div>

  <script>
    (function () {
      var DEEP_LINK_SCHEME = "fitconnectapp://reset-password";

      var params = new URLSearchParams(window.location.search);
      var token = params.get("token");
      var email = params.get("email");

      if (!token || !email) {
        document.getElementById("heading").textContent = "Link inválido";
        document.getElementById("body").textContent = "";
        document.getElementById("deeplink-btn").style.display = "none";
        document.getElementById("error-msg").style.display = "block";
        return;
      }

      var deepLink =
        DEEP_LINK_SCHEME +
        "?token=" + encodeURIComponent(token) +
        "&email=" + encodeURIComponent(email);

      document.getElementById("deeplink-btn").href = deepLink;

      // Auto-redirect immediately — browser will open the app if installed
      window.location.href = deepLink;
    })();
  </script>
</body>
</html>
